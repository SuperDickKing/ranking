<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名表白墙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      padding: 30px 28px;
      position: relative;
    }
    h1 { text-align: center; font-weight: 500; color: #4a6fa5; margin-bottom: 6px; user-select: none; }
    h1::before, h1::after { content: "💌"; font-size: 1.5rem; }
    #admin-indicator {
      text-align: center; font-size: 0.7rem; color: #e74c3c; font-weight: bold; display: none; margin-bottom: 10px;
    }
    #messages {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      height: 380px;
      overflow-y: auto;
      margin-bottom: 20px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #d4dce6; border-radius: 10px; }
    .msg {
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #f8faff;
      border-radius: 12px;
      border-left: 4px solid #7aa2d6;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .msg-content { flex: 1; color: #2c3e50; line-height: 1.6; word-break: break-word; cursor: pointer; }
    .msg-content:hover { color: #1a2b4c; }
    .msg-time { font-size: 0.7rem; color: #95a5a6; white-space: nowrap; }
    .msg-stats {
      display: flex; gap: 12px; font-size: 0.8rem; color: #5a6b7c; margin-top: 4px; align-items: center;
    }
    .msg-stats span {
      cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px; transition: 0.2s;
    }
    .like-btn:hover { color: #e74c3c; }
    .dislike-btn:hover { color: #3498db; }
    .reply-toggle:hover { color: #2ecc71; }
    .active-like { color: #e74c3c; font-weight: bold; }
    .active-dislike { color: #3498db; font-weight: bold; }

    .msg-stats .delete-btn {
      color: #c92a2a; font-weight: bold; cursor: pointer; margin-left: 8px;
      display: none;
    }
    .msg-stats .delete-btn.show {
      display: inline-flex;
    }

    .reply-item {
      padding: 8px 10px; margin-bottom: 6px; background: #fff; border-radius: 8px; font-size: 0.85rem;
      color: #2c3e50; display: flex; justify-content: space-between; align-items: center;
    }
    .reply-text { flex: 1; word-break: break-word; }
    .reply-time { font-size: 0.7rem; color: #aaa; margin-left: 10px; white-space: nowrap; }
    .reply-del {
      cursor: pointer; color: #c92a2a; margin-left: 8px; font-weight: bold; display: none;
    }
    .reply-del.show { display: inline-block; }

    .reply-section {
      margin-top: 10px; padding-top: 10px; border-top: 1px dashed #d0d7e6; display: none; animation: fadeIn 0.2s;
    }
    .reply-section.open { display: block; }
    .reply-input-wrap { display: flex; gap: 6px; margin-top: 8px; }
    .reply-input {
      flex: 1; padding: 8px 10px; border: 2px solid #e0e7f0; border-radius: 10px; font-size: 0.85rem;
      outline: none; font-family: inherit;
    }
    .reply-input:focus { border-color: #7aa2d6; }
    .reply-submit {
      padding: 8px 16px; background: #7aa2d6; color: #fff; border: none; border-radius: 10px;
      cursor: pointer; font-weight: 500; font-size: 0.85rem; white-space: nowrap;
    }
    .reply-submit:hover { background: #5d8ac8; }

    textarea#input {
      width: 100%; height: 70px; padding: 14px 16px; border: 2px solid #e0e7f0;
      border-radius: 16px; resize: none; outline: none; font-family: inherit;
    }
    textarea#input:focus { border-color: #7aa2d6; }
    button#submit-btn {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #7aa2d6, #5d8ac8);
      color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 500; transition: 0.3s; margin-top: 12px;
    }
    button#submit-btn:hover { background: linear-gradient(135deg, #5d8ac8, #4a6fa5); }
    #status { margin-top: 10px; color: #4a6fa5; text-align: center; min-height: 22px; }
    #error-detail { background: #fff0f0; color: #c92a2a; padding: 12px; margin-top: 12px; border-radius: 12px; display: none; white-space: pre-wrap; }
    .empty-msg { text-align: center; color: #aaa; padding: 30px; }

    #admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
    }
    #admin-modal.show { display: flex; }
    .admin-box {
      background: #fff; border-radius: 20px; padding: 24px; width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .admin-box h3 { margin-bottom: 16px; color: #4a6fa5; text-align: center; }
    .admin-box input {
      width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid #e0e7f0; border-radius: 10px; outline: none;
    }
    .admin-box input:focus { border-color: #7aa2d6; }
    .admin-box button {
      width: 100%; padding: 10px; background: #7aa2d6; color: #fff; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 8px;
    }
    .admin-box button:hover { background: #5d8ac8; }
    .admin-box .admin-link {
      text-align: center; font-size: 0.8rem; color: #7aa2d6; cursor: pointer; margin-top: 4px;
    }
    .admin-box .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="main-title">匿名表白墙</h1>
    <div id="admin-indicator">🔑 管理员模式</div>
    <div id="messages">加载中...</div>
    <textarea id="input" placeholder="写下你想说的话（支持所有语言、emoji）..." maxlength="500"></textarea>
    <button id="submit-btn">🌿 匿名提交</button>
    <p id="status"></p>
    <div id="error-detail"></div>
  </div>

  <div id="admin-modal">
    <div class="admin-box">
      <h3 id="admin-modal-title">管理员登录</h3>
      <input type="text" id="admin-username" placeholder="用户名" />
      <input type="password" id="admin-password" placeholder="密码" />
      <input type="password" id="admin-old-password" class="hidden" placeholder="当前密码" />
      <input type="text" id="admin-new-username" class="hidden" placeholder="新用户名" />
      <input type="password" id="admin-new-password" class="hidden" placeholder="新密码" />
      <button id="admin-action-btn">登录</button>
      <div class="admin-link" id="admin-logout" style="display:none;">退出登录</div>
      <div class="admin-link" id="admin-close-modal">取消</div>
    </div>
  </div>

  <script>
    // ==================== 1. 配置与 Token ====================
    const P1 = 'Z2hwX00xRFFWTkdEWFZmYTFJQkty';
    const P2 = 'OTZGdVlJRzlyQmx5czNxQXMzWQ==';
    const TOKEN = atob(P1 + P2);
    const CONFIG = {
      owner: 'LiveTF',
      repo: 'love-wall',
      branch: 'main',
      dataPath: 'msg.json',
      get rawUrl() { return `https://raw.githubusercontent.com/${this.owner}/${this.repo}/${this.branch}/${this.dataPath}?t=${Date.now()}_${Math.random().toString(36)}`; },
      get apiUrl() { return `https://api.github.com/repos/${this.owner}/${this.repo}/contents/${this.dataPath}`; }
    };

    // ==================== 2. 工具函数 ====================
    function encodeUTF8(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }
    function decodeUTF8(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }
    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatTime(ts) {
      return new Date(ts).toLocaleString();
    }
    function cloneData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    // ==================== 3. 管理员功能（持久化到仓库） ====================
    let isAdmin = false;
    const SECRET = 'lovewall_secret_xor';
    function encrypt(text) {
      return btoa(text.split('').map((c,i) => String.fromCharCode(c.charCodeAt(0) ^ SECRET.charCodeAt(i % SECRET.length))).join(''));
    }
    function decrypt(enc) {
      const binary = atob(enc);
      let result = '';
      for (let i = 0; i < binary.length; i++) {
        result += String.fromCharCode(binary.charCodeAt(i) ^ SECRET.charCodeAt(i % SECRET.length));
      }
      return result;
    }

    // 从 _data 对象中读取管理员凭据
    function getAdminCred() {
      if (!_data || !_data._admin) return null;
      try {
        const adm = _data._admin;
        return {
          username: decrypt(adm.u),
          password: decrypt(adm.p)
        };
      } catch (e) { return null; }
    }

    // 将凭据写入 _data._admin
    function setAdminCred(username, password) {
      _data._admin = {
        u: encrypt(username),
        p: encrypt(password)
      };
    }

    // 如果仓库中没有 _admin 字段，初始化默认管理员
    function ensureDefaultAdmin() {
      if (!_data._admin) {
        setAdminCred('admin', 'admin123');
      }
    }

    // 显示/隐藏管理弹窗
    function showAdminModal(mode = 'login') {
      const modal = document.getElementById('admin-modal');
      modal.classList.add('show');
      document.getElementById('admin-username').value = '';
      document.getElementById('admin-password').value = '';
      document.getElementById('admin-old-password').value = '';
      document.getElementById('admin-new-username').value = '';
      document.getElementById('admin-new-password').value = '';

      const oldPwdInput = document.getElementById('admin-old-password');
      const newUserInput = document.getElementById('admin-new-username');
      const newPwdInput = document.getElementById('admin-new-password');
      const usernameInput = document.getElementById('admin-username');
      const passwordInput = document.getElementById('admin-password');
      const title = document.getElementById('admin-modal-title');
      const actionBtn = document.getElementById('admin-action-btn');
      const logoutBtn = document.getElementById('admin-logout');

      if (mode === 'login') {
        title.innerText = '管理员登录';
        actionBtn.innerText = '登录';
        usernameInput.classList.remove('hidden');
        passwordInput.classList.remove('hidden');
        oldPwdInput.classList.add('hidden');
        newUserInput.classList.add('hidden');
        newPwdInput.classList.add('hidden');
        logoutBtn.style.display = 'none';
      } else if (mode === 'change') {
        title.innerText = '修改管理员凭据';
        actionBtn.innerText = '修改';
        usernameInput.classList.add('hidden');
        passwordInput.classList.add('hidden');
        oldPwdInput.classList.remove('hidden');
        newUserInput.classList.remove('hidden');
        newPwdInput.classList.remove('hidden');
        logoutBtn.style.display = 'block';
      }
    }

    function hideAdminModal() {
      document.getElementById('admin-modal').classList.remove('show');
    }

    async function handleAdminAction() {
      const mode = document.getElementById('admin-modal-title').innerText;
      if (mode.includes('登录')) {
        const username = document.getElementById('admin-username').value.trim();
        const password = document.getElementById('admin-password').value.trim();
        if (!username || !password) return alert('用户名和密码不能为空');
        const cred = getAdminCred();
        if (!cred) return alert('系统中还没有管理员账户，请刷新页面初始化');
        if (cred.username === username && cred.password === password) {
          isAdmin = true;
          document.getElementById('admin-indicator').style.display = 'block';
          renderMessages();
          hideAdminModal();
          setStatus('✅ 管理员登录成功');
        } else {
          alert('用户名或密码错误');
        }
      } else if (mode.includes('修改')) {
        const oldPwd = document.getElementById('admin-old-password').value.trim();
        const newUser = document.getElementById('admin-new-username').value.trim();
        const newPwd = document.getElementById('admin-new-password').value.trim();
        if (!oldPwd || !newUser || !newPwd) return alert('所有字段不能为空');
        const cred = getAdminCred();
        if (!cred) return alert('系统错误');
        if (cred.password !== oldPwd) return alert('当前密码错误');
        
        // 更新并保存到仓库
        setAdminCred(newUser, newPwd);
        const snapshot = cloneData(_data);
        try {
          await saveData(snapshot);
          alert('凭据已更新，请使用新账号重新登录');
          isAdmin = false;
          document.getElementById('admin-indicator').style.display = 'none';
          renderMessages();
          hideAdminModal();
        } catch (e) {
          alert('保存失败：' + e.message);
        }
      }
    }

    function logoutAdmin() {
      isAdmin = false;
      document.getElementById('admin-indicator').style.display = 'none';
      renderMessages();
      hideAdminModal();
      setStatus('已退出管理员模式');
    }

    // 删除操作（已使用 _data.messages）
    async function deleteMessage(msgId) {
      if (!confirm('确定要删除这条留言吗？此操作不可恢复。')) return;
      _data.messages = _data.messages.filter(m => m.id !== msgId);
      const snapshot = cloneData(_data);
      try {
        await saveData(snapshot);
        renderMessages();
        setStatus('✅ 留言已删除');
      } catch (e) {
        setStatus('❌ 删除失败：' + e.message, true);
        await refresh();
      }
    }

    async function deleteReply(msgId, replyId) {
      if (!confirm('确定要删除这条回复吗？')) return;
      const msg = _data.messages.find(m => m.id === msgId);
      if (!msg) return;
      msg.replies = msg.replies.filter(r => r.id !== replyId);
      const snapshot = cloneData(_data);
      try {
        await saveData(snapshot);
        renderMessages();
        setStatus('✅ 回复已删除');
      } catch (e) {
        setStatus('❌ 删除失败：' + e.message, true);
        await refresh();
      }
    }

    // ==================== 4. 数据存储层 ====================
    const MAX_MESSAGES = 500;
    let _data = { messages: [], _admin: null };   // 统一数据结构
    let _isSaving = false;
    let _pendingSaves = [];

    // 本地点赞记录（仍使用 localStorage，不影响跨设备）
    const voteRecord = JSON.parse(localStorage.getItem('lv_votes') || '{}');
    function saveVoteRecord() { localStorage.setItem('lv_votes', JSON.stringify(voteRecord)); }

    async function loadFromAPI() {
      const res = await fetch(CONFIG.apiUrl, {
        headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!res.ok) throw new Error(`API 读取失败 (${res.status})`);
      const json = await res.json();
      return JSON.parse(decodeUTF8(json.content.replace(/\n/g, '')));
    }
    async function loadFromRaw() {
      const res = await fetch(CONFIG.rawUrl, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`Raw 读取失败 (${res.status})`);
      return await res.json();
    }

    async function loadData() {
      let raw;
      try { raw = await loadFromAPI(); }
      catch (e) { console.warn('降级 raw:', e.message); raw = await loadFromRaw(); }

      // 兼容旧格式：如果是数组，转换为对象格式
      if (Array.isArray(raw)) {
        _data = { messages: raw, _admin: null };
      } else if (raw && typeof raw === 'object') {
        _data = raw;
        if (!_data.messages) _data.messages = [];
        if (!_data._admin) _data._admin = null;
      } else {
        _data = { messages: [], _admin: null };
      }

      // 确保管理员账户存在
      ensureDefaultAdmin();

      // 补齐留言字段
      _data.messages.forEach(msg => {
        msg.likes = msg.likes || 0;
        msg.dislikes = msg.dislikes || 0;
        msg.replies = msg.replies || [];
      });
      return _data;
    }

    async function saveData(dataToSave) {
      return new Promise((resolve, reject) => {
        if (_isSaving) {
          _pendingSaves.push({ data: dataToSave, resolve, reject });
          return;
        }
        _isSaving = true;

        const saveProcess = async (data) => {
          try {
            const getRes = await fetch(CONFIG.apiUrl, {
              headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (!getRes.ok) throw new Error(`获取 SHA 失败 (${getRes.status})`);
            const fileInfo = await getRes.json();
            const sha = fileInfo.sha;

            const jsonStr = JSON.stringify(data, null, 2);
            const contentBase64 = encodeUTF8(jsonStr);

            const putRes = await fetch(CONFIG.apiUrl, {
              method: 'PUT',
              headers: {
                'Authorization': `Bearer ${TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: `update [${new Date().toLocaleString('zh-CN')}]`,
                content: contentBase64,
                sha: sha,
                branch: CONFIG.branch
              })
            });
            if (!putRes.ok) throw new Error(`保存失败 (${putRes.status})`);

            _isSaving = false;
            resolve();
            processNextSave();
          } catch (err) {
            _isSaving = false;
            reject(err);
            processNextSave();
          }
        };

        const processNextSave = () => {
          if (_pendingSaves.length > 0) {
            const next = _pendingSaves.shift();
            _isSaving = true;
            saveProcess(next.data).then(next.resolve).catch(next.reject);
          }
        };

        saveProcess(dataToSave);
      });
    }

    // ==================== 5. 视图渲染（只渲染 messages 数组） ====================
    function renderMessages() {
      const container = document.getElementById('messages');
      const openIds = [];
      container.querySelectorAll('.reply-section.open').forEach(section => {
        openIds.push(section.id.replace('replies-', ''));
      });
      const scrollTop = container.scrollTop;

      const messages = _data.messages || [];
      if (!messages.length) {
        container.innerHTML = '<div class="empty-msg">✨ 还没有留言，快来写下第一条吧 ~</div>';
        return;
      }

      const adminActive = isAdmin && getAdminCred() !== null;

      container.innerHTML = messages.map(msg => {
        const replyCount = msg.replies.length;
        const userVote = voteRecord[msg.id] || '';
        return `
          <div class="msg" data-id="${msg.id}">
            <div class="msg-header">
              <div class="msg-content" data-action="toggle-reply" data-id="${msg.id}">${escapeHtml(msg.text)}</div>
              <div class="msg-time">${formatTime(msg.time)}</div>
            </div>
            <div class="msg-stats">
              <span class="like-btn ${userVote==='like'?'active-like':''}" data-action="vote" data-id="${msg.id}" data-type="like">👍 ${msg.likes}</span>
              <span class="dislike-btn ${userVote==='dislike'?'active-dislike':''}" data-action="vote" data-id="${msg.id}" data-type="dislike">👎 ${msg.dislikes}</span>
              <span class="reply-toggle" data-action="toggle-reply" data-id="${msg.id}">💬 ${replyCount}</span>
              <span class="delete-btn ${adminActive ? 'show' : ''}" data-action="delete-msg" data-id="${msg.id}">🗑️ 删除</span>
            </div>
            <div class="reply-section" id="replies-${msg.id}">
              ${msg.replies.map(r => `
                <div class="reply-item">
                  <div class="reply-text">${escapeHtml(r.text)}</div>
                  <div class="reply-time">${formatTime(r.time)}</div>
                  <span class="reply-del ${adminActive ? 'show' : ''}" data-action="delete-reply" data-msgid="${msg.id}" data-replyid="${r.id}">❌</span>
                </div>
              `).join('')}
              <div class="reply-input-wrap">
                <input class="reply-input" id="reply-input-${msg.id}" placeholder="写下回复..." maxlength="300" />
                <button class="reply-submit" data-action="submit-reply" data-id="${msg.id}">回复</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      openIds.forEach(id => {
        const section = document.getElementById(`replies-${id}`);
        if (section) section.classList.add('open');
      });
      container.scrollTop = scrollTop;
    }

    // ==================== 6. 核心业务逻辑 ====================
    const statusEl = document.getElementById('status');
    const errorBox = document.getElementById('error-detail');
    let countdownTimer = null;
    let retryCount = 0;

    function setStatus(text, isError = false) {
      statusEl.innerText = text;
      if (isError) {
        errorBox.style.display = 'block';
        errorBox.innerHTML = text + '<br><button id="retry-btn" onclick="refresh()">点击重试</button>';
      } else {
        errorBox.style.display = 'none';
      }
    }

    function startCountdown(seconds) {
      clearInterval(countdownTimer);
      let remaining = seconds;
      statusEl.innerText = `✅ 操作成功！${remaining} 秒后自动刷新...`;
      countdownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          statusEl.innerText = '正在刷新...';
          refresh();
        } else {
          statusEl.innerText = `✅ 操作成功！${remaining} 秒后自动刷新...`;
        }
      }, 1000);
    }

    async function refresh() {
      if (isAdmin && !getAdminCred()) {
        isAdmin = false;
        document.getElementById('admin-indicator').style.display = 'none';
      }
      try {
        retryCount = 0;
        await loadData();
        renderMessages();
        setStatus('');
      } catch (e) {
        if (retryCount < 1) {
          retryCount++;
          setTimeout(refresh, 2000);
        } else {
          setStatus('❌ 刷新数据失败：' + e.message, true);
        }
      }
    }

    async function handleVote(msgId, type) {
      const msg = _data.messages.find(m => m.id === msgId);
      if (!msg) return;
      const current = voteRecord[msgId];
      if (current === type) {
        delete voteRecord[msgId];
        if (type === 'like') msg.likes = Math.max(0, msg.likes - 1);
        else msg.dislikes = Math.max(0, msg.dislikes - 1);
      } else {
        if (current) {
          if (current === 'like') msg.likes = Math.max(0, msg.likes - 1);
          else msg.dislikes = Math.max(0, msg.dislikes - 1);
          delete voteRecord[msgId];
        }
        voteRecord[msgId] = type;
        if (type === 'like') msg.likes += 1;
        else msg.dislikes += 1;
      }
      saveVoteRecord();
      renderMessages();
      const snapshot = cloneData(_data);
      try {
        await saveData(snapshot);
        setStatus('✅ 投票已更新');
      } catch (e) {
        setStatus('❌ 投票失败：' + e.message, true);
        await refresh();
      }
    }

    async function submitReply(msgId) {
      const input = document.getElementById(`reply-input-${msgId}`);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      const msg = _data.messages.find(m => m.id === msgId);
      if (!msg) return;
      msg.replies.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
        text: text.slice(0,300),
        time: new Date().toISOString()
      });
      input.value = '';
      renderMessages();
      document.getElementById(`replies-${msgId}`)?.classList.add('open');
      const snapshot = cloneData(_data);
      try {
        await saveData(snapshot);
        startCountdown(60);
      } catch (e) {
        setStatus('❌ 回复失败：' + e.message, true);
        await refresh();
      }
    }

    async function handleNewPost(text) {
      if (!_data) await loadData();
      const newMsg = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
        text: text.slice(0,500),
        time: new Date().toISOString(),
        likes: 0,
        dislikes: 0,
        replies: []
      };
      _data.messages.push(newMsg);
      if (_data.messages.length > MAX_MESSAGES) {
        _data.messages = _data.messages.slice(-MAX_MESSAGES);
      }
      renderMessages();
      document.getElementById('input').value = '';
      const snapshot = cloneData(_data);
      try {
        await saveData(snapshot);
        startCountdown(60);
      } catch (e) {
        setStatus('❌ 提交失败：' + e.message, true);
        await refresh();
      }
    }

    // ==================== 7. 事件绑定 ====================
    document.getElementById('submit-btn').addEventListener('click', () => {
      const text = document.getElementById('input').value.trim();
      if (!text) return;
      setStatus('提交中...');
      handleNewPost(text);
    });

    document.getElementById('messages').addEventListener('click', (e) => {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      const action = target.dataset.action;
      const msgId = target.dataset.id;
      const replyId = target.dataset.replyid;

      if (action === 'toggle-reply') {
        const section = document.getElementById(`replies-${msgId}`);
        if (section) section.classList.toggle('open');
      }
      else if (action === 'vote') {
        handleVote(msgId, target.dataset.type);
      }
      else if (action === 'submit-reply') {
        submitReply(msgId);
      }
      else if (action === 'delete-msg') {
        deleteMessage(msgId);
      }
      else if (action === 'delete-reply') {
        deleteReply(msgId, replyId);
      }
    });

    document.getElementById('messages').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        const target = e.target.closest('.reply-input');
        if (target) {
          e.preventDefault();
          const msgId = target.id.replace('reply-input-', '');
          submitReply(msgId);
        }
      }
    });

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('submit-btn').click();
      }
    });

    // 管理员入口（隐藏）
    let clickCount = 0;
    let clickTimer = null;
    document.getElementById('main-title').addEventListener('click', () => {
      clickCount++;
      if (clickCount >= 5) {
        clearTimeout(clickTimer);
        clickCount = 0;
        if (isAdmin) {
          showAdminModal('change');
        } else {
          showAdminModal('login');
        }
      } else {
        if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
      }
    });

    document.getElementById('admin-action-btn').addEventListener('click', handleAdminAction);
    document.getElementById('admin-close-modal').addEventListener('click', hideAdminModal);
    document.getElementById('admin-logout').addEventListener('click', logoutAdmin);

    document.getElementById('admin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAdminAction();
    });
    document.getElementById('admin-new-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAdminAction();
    });

    // ==================== 8. 启动 ====================
    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
